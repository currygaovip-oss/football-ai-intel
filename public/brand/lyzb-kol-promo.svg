<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="glowLeft" cx="22%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#00e5b0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00e5b0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="82%" cy="12%" r="38%">
      <stop offset="0%" stop-color="#d6aa44" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#d6aa44" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#03120d"/>
      <stop offset="52%" stop-color="#061d13"/>
      <stop offset="100%" stop-color="#020604"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00dca8"/>
      <stop offset="100%" stop-color="#00b98f"/>
    </linearGradient>
    <pattern id="grid" width="86" height="86" patternUnits="userSpaceOnUse">
      <path d="M86 0H0V86" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowLeft)"/>
  <rect width="1600" height="900" fill="url(#glowGold)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.72"/>

  <g transform="translate(-180 580) rotate(-8)">
    <ellipse cx="450" cy="310" rx="450" ry="310" fill="none" stroke="#00e5b0" stroke-opacity="0.28" stroke-width="4"/>
    <ellipse cx="450" cy="310" rx="260" ry="160" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
    <circle cx="450" cy="310" r="44" fill="#00e5b0" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
  </g>

  <line x1="580" y1="244" x2="870" y2="305" stroke="#00e5b0" stroke-opacity="0.48" stroke-width="3"/>
  <line x1="540" y1="608" x2="930" y2="546" stroke="#00e5b0" stroke-opacity="0.42" stroke-width="3"/>
  <circle cx="870" cy="305" r="7" fill="#00e5b0" opacity="0.7"/>
  <circle cx="930" cy="546" r="7" fill="#00e5b0" opacity="0.6"/>

  <rect x="430" y="166" width="280" height="96" rx="18" fill="#031c13" fill-opacity="0.72" stroke="#00e5b0" stroke-opacity="0.24" filter="url(#cardShadow)"/>
  <rect x="390" y="552" width="320" height="116" rx="18" fill="#031c13" fill-opacity="0.72" stroke="#00e5b0" stroke-opacity="0.24" filter="url(#cardShadow)"/>
  <rect x="1124" y="732" width="390" height="92" rx="18" fill="#031c13" fill-opacity="0.72" stroke="#d6aa44" stroke-opacity="0.32" filter="url(#cardShadow)"/>

  <g filter="url(#softGlow)">
    <circle cx="370" cy="382" r="254" fill="#00e5b0" fill-opacity="0.1"/>
  </g>
  <circle cx="370" cy="382" r="250" fill="#000000" fill-opacity="0.16"/>
  <image href="football-ai-logo-universal.png" x="160" y="172" width="420" height="420" preserveAspectRatio="xMidYMid slice"/>

  <g transform="translate(790 125)">
    <rect x="0" y="0" width="505" height="58" rx="29" fill="#00e5b0" fill-opacity="0.1" stroke="#00e5b0" stroke-opacity="0.36"/>
    <circle cx="31" cy="29" r="7" fill="#00e5b0"/>
    <text x="58" y="38" fill="#00e5b0" font-size="28" font-weight="700" letter-spacing="1.2" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">FOOTBALL AI INTELLIGENCE</text>

    <text x="0" y="200" fill="#ffffff" font-size="104" font-weight="900" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">绿茵智报</text>
    <text x="0" y="286" fill="#d7fff0" font-size="44" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">中文足球 AI 赛前情报</text>

    <g transform="translate(0 344)" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff" fill-opacity="0.84">
      <rect x="0" y="0" width="150" height="62" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="22" y="41">今日赛程</text>
      <rect x="166" y="0" width="150" height="62" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="188" y="41">参考方向</text>
      <rect x="332" y="0" width="150" height="62" rx="14" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.14"/>
      <text x="354" y="41">赛后复盘</text>
    </g>

    <g transform="translate(0 464)">
      <rect width="274" height="78" rx="16" fill="url(#button)"/>
      <text x="28" y="52" fill="#02110c" font-size="38" font-weight="900" letter-spacing="1" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">lyzbvip.vip</text>
    </g>
  </g>

  <text x="120" y="810" fill="#ffffff" fill-opacity="0.54" font-size="24" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">世界杯 · 五大联赛 · 焦点赛事</text>
  <text x="1184" y="810" fill="#ffffff" fill-opacity="0.54" font-size="24" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">官方 X：</text>
  <text x="1278" y="810" fill="#d6aa44" font-size="24" font-weight="800" font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, Arial, sans-serif">@worldcupvip</text>
</svg>
